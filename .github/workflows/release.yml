name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch ffmpeg/ffprobe sidecars
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            scripts/fetch-ffmpeg.sh universal-apple-darwin
          else
            scripts/fetch-ffmpeg.sh x86_64-pc-windows-msvc
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CourseCut ${{ github.ref_name }}'
          releaseBody: 'See the landing page for release notes.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
